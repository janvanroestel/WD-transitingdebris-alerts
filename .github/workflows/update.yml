name: Update Data and Rebuild Site

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest alerts
        env:
          KOWALSKI_USERNAME: ${{ secrets.KOWALSKI_USERNAME }}
          KOWALSKI_PASSWORD: ${{ secrets.KOWALSKI_PASSWORD }}
          KOWALSKI_HOST: ${{ secrets.KOWALSKI_HOST }}
        run: python scripts/fetch_alerts.py

      - name: Process forced photometry
        run: python scripts/process_forcedphot.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Auto-update: $(date -u +%Y-%m-%d)"
          git push
